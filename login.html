<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Feedback System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🔐 Admin Feedback System</h1>
    </header>

    <div class="container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <p class="login-subtitle">Secure access to your admin dashboard</p>
            
            <form class="login-form" action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username or email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="login-button">Sign In</button>
            </form>

            <div class="login-footer">
                <a href="/" class="back-home">Back to Home</a>
                <script>
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('error')) {
                        document.body.insertAdjacentHTML(
                        'afterbegin',
                        '<p style="color:red">Login Failed. Debug hint: Check database for user "admin" with password "admin123".</p>'
                        );
                    }
                </script>
            </div>
        </div>
    </div>
